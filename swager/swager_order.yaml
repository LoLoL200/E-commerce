openapi: 3.0.0
info:
  title: E-commerce API
  version: 1.0.0

paths:
  # --- ЕНДПОЇНТИ ЗАМОВЛЕНЬ ---
  /orders:
    post:
      tags:
        - замовлення
      summary: Створити замовлення з кошика
      operationId: createOrder
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Замовлення успішно створено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Помилка сервера

    get:
      tags:
        - замовлення
      summary: Список моїх замовлень
      operationId: listMyOrders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список замовлень отримано
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{id}:
    get:
      tags:
        - замовлення
      summary: Деталі конкретного замовлення
      parameters:
        - name: id
          in: path
          required: true
          description: UUID замовлення
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Деталі отримано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Замовлення не знайдено

  /orders/{id}/cancel:
    put:
      tags:
        - замовлення
      summary: Скасування замовлення
      parameters:
        - name: id
          in: path
          required: true
          description: UUID замовлення
          schema:
            type: string
            format: uuid
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успішно скасовано
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "cancelled"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Не авторизовано
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "unauthorized"

  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Унікальний ідентифікатор замовлення
        user_id:
          type: string
          format: uuid
          description: ID користувача
        status:
          type: string
          enum: [pending, paid, shipped, cancelled]
          description: Статус замовлення (очікується, оплачено, відправлено, скасовано)
          example: "pending"
        total_amount:
          type: number
          format: float
          description: Загальна сума
          example: 299.99
        shipping_address:
          type: string
          description: Адреса доставки
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        created_at:
          type: string
          format: date-time
          description: Дата створення

    OrderItem:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          description: ID товару
        quantity:
          type: integer
          description: Кількість
          example: 1
        price:
          type: number
          format: float
          description: Ціна за одиницю
          example: 99.99