openapi: 3.0.0
info:
  title: E-commerce API Кошика
  version: 1.0.0

# Базовий шлях (якщо у вашому коді на Go встановлено префікс /cart)
servers:
  - url: /api/v1
    description: Основний сервер

paths:
  /cart:
    get:
      tags:
        - кошик
      summary: Отримати кошик користувача
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успішно отримано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags:
        - кошик
      summary: Очистити кошик
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Кошик успішно очищено

  /cart/items:
    post:
      tags:
        - кошик
      summary: Додати товар у кошик
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        '201':
          description: Товар додано
        '400':
          description: Помилка валідації

  /cart/items/{id}:
    put:
      tags:
        - кошик
      summary: Оновити кількість товару
      parameters:
        - name: id
          in: path
          required: true
          description: UUID елемента кошика
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
                  description: Нова кількість товару
      responses:
        '200':
          description: Кількість оновлено

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Помилка авторизації
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Опис помилки

    Cart:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID кошика
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          description: Список товарів у кошику

    CartItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Унікальний ідентифікатор запису в кошику
        product_id:
          type: string
          format: uuid
          description: ID товару
        quantity:
          type: integer
          description: Кількість
        price:
          type: number
          description: Ціна за одиницю товару

    AddToCartRequest:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
          format: uuid
          description: ID товару, який потрібно додати
        quantity:
          type: integer
          minimum: 1
          example: 2
          description: Кількість товару